name: Actualizar Nómina Diputados

on:
  schedule:
    - cron: '0 8 * * *'   # Todos los días a las 08:00 UTC (05:00 Argentina)
  workflow_dispatch:        # Ejecución manual desde Actions

jobs:
  scrape:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Instalar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install requests beautifulsoup4 pandas lxml

      - name: Ejecutar scraper
        run: python obtener_datos.py

      - name: Commit y push si hay cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f nomina_diputados.csv
          git diff --cached --quiet || git commit -m "data: actualizar nomina_diputados.csv $(date -u +%Y-%m-%d)"
          git push