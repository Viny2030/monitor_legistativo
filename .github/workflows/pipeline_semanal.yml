name: Pipeline Semanal MEL-TP

on:
  schedule:
    # Lunes 6am Argentina (UTC-3) = lunes 9am UTC
    - cron: '0 9 * * 1'
    # TC también se actualiza diariamente a las 10am UTC (7am AR)
  workflow_dispatch:  # permite correr manualmente desde GitHub Actions

jobs:
  pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      # ── 0. Tipo de cambio (siempre) ──────────────────────────────────────
      - name: Actualizar tipo de cambio (BNA oficial)
        run: python scripts/actualizar_tc.py

      # ── 1. Nómina de diputados ───────────────────────────────────────────
      - name: Actualizar nómina de diputados
        run: python obtener_datos.py
        continue-on-error: true

      # ── 2. Asistencia ────────────────────────────────────────────────────
      # - name: Actualizar asistencia
      #   run: python scraper_asistencia.py
      #   continue-on-error: true

      # ── 3. TEL real desde datos.hcdn.gob.ar ──────────────────────────────
      - name: Actualizar TEL real
        run: python scripts/actualizar_tel.py
        continue-on-error: true

      # ── 4. Bipartisan real desde votaciones.hcdn.gob.ar ──────────────────
      - name: Actualizar Bipartisan real
        run: python scripts/actualizar_bipartisan.py
        continue-on-error: true

      # ── 5. Presupuesto Abierto — Jurisdicción 01 ─────────────────────────
      - name: Cruzar Presupuesto Abierto
        run: python scripts/cruzar_presupuesto.py
        continue-on-error: true

      # ── 6. Generar ranking SFE ───────────────────────────────────────────
      - name: Calcular ranking SFE
        run: python pipeline.py --skip-scraping

      # ── Commit y push de datos actualizados ──────────────────────────────
      - name: Commit datos actualizados
        run: |
          git config --global user.name  "MEL-TP Bot"
          git config --global user.email "bot@mel-tp.ar"
          git add \
            tc.json \
            nomina_diputados.csv \
            ranking_sfe.csv \
            tel_diputados.csv \
            bipartisan_diputados.csv \
            presupuesto_legislativo.json \
            || true
          git diff --cached --quiet || git commit -m "🤖 Auto-update datos $(date '+%Y-%m-%d')"
          git push || true