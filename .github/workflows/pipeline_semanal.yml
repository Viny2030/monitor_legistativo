name: Pipeline Semanal MEL-TP

on:
  schedule:
    # Corre a las 09:00 UTC (06:00 AR) los días 5 y 28 de cada mes
    - cron: '0 9 5,28 * *'
  workflow_dispatch: # Permite correrlo a mano si quieres probar

jobs:
  pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias
        run: |
          pip install -r requirements.txt
          pip install holidays # Aseguramos que esté instalada

      - name: Actualizar Bipartisan
        run: python scripts/actualizar_bipartisan.py
        # Ya no necesitamos continue-on-error porque el script 
        # ahora maneja el cierre limpio si es feriado.
