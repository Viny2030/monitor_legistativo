name: Tests Diarios Monitor Legislativo

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:

  unit-tests:
    name: Tests Unitarios
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov httpx

      - name: Ejecutar tests unitarios
        env:
          REFRESH_TOKEN: "test_token_ci"
          DATA_FILE: "data/diputados.json"
        run: |
          pytest tests/ \
            --ignore=tests/test_live.py \
            --ignore=tests/test_scraper_hcdn.py \
            --ignore=tests/test_obtener_datos.py \
            -v \
            --tb=short \
            --junitxml=test-results/unit.xml \
            -p no:warnings

      - name: Subir resultados
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: test-results/
          retention-days: 30

  smoke-tests:
    name: Smoke Tests Railway
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias
        run: pip install pytest requests

      - name: Ejecutar smoke tests
        env:
          LIVE_URL: https://monitorlegistativo-production.up.railway.app
        run: |
          pytest tests/test_live.py \
            -v \
            -m live \
            --tb=short \
            --junitxml=test-results/smoke.xml \
            -p no:warnings
        continue-on-error: true

      - name: Subir resultados
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-results
          path: test-results/
          retention-days: 30

  notificar:
    name: Notificaciones
    runs-on: ubuntu-latest
    needs: [unit-tests, smoke-tests]
    if: always()

    steps:
      - name: Capturar fecha
        id: fecha
        run: echo "fecha=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Notificar exito completo
        if: needs.unit-tests.result == 'success' && needs.smoke-tests.result == 'success'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USER }}
          password: ${{ secrets.MAIL_PASS }}
          to: viny01958@gmail.com
          from: Monitor Tests Legislativo <${{ secrets.MAIL_USER }}>
          subject: "Tests OK - Monitor Legislativo ${{ steps.fecha.outputs.fecha }}"
          body: |
            Todos los tests pasaron correctamente.

            Tests unitarios: OK
            Smoke tests Railway: OK

            Ver detalles: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Notificar fallo unit tests
        if: needs.unit-tests.result == 'failure'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USER }}
          password: ${{ secrets.MAIL_PASS }}
          to: viny01958@gmail.com
          from: Monitor Tests Legislativo <${{ secrets.MAIL_USER }}>
          subject: "Tests FALLARON - Monitor Legislativo ${{ steps.fecha.outputs.fecha }}"
          body: |
            Los tests unitarios fallaron. Se requiere revision urgente.

            Ver logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Posibles causas:
            - Cambios en api_server.py o _bloque_stats()
            - Dependencias desactualizadas en requirements.txt
            - Cambios en el schema de diputados.json

      - name: Notificar fallo smoke tests
        if: needs.unit-tests.result == 'success' && needs.smoke-tests.result == 'failure'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USER }}
          password: ${{ secrets.MAIL_PASS }}
          to: viny01958@gmail.com
          from: Monitor Tests Legislativo <${{ secrets.MAIL_USER }}>
          subject: "Railway sin respuesta - Monitor Legislativo ${{ steps.fecha.outputs.fecha }}"
          body: |
            Los smoke tests de produccion fallaron. La app en Railway puede estar caida.

            Tests unitarios: OK
            Smoke tests Railway: FALLARON

            URL: https://monitorlegistativo-production.up.railway.app

            Ver logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Posibles causas:
            - Railway app en sleep mode o caida
            - Error en el ultimo deployment
            - DATA_FILE o REFRESH_TOKEN expirados en Railway
