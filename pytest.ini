[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers disponibles
markers =
    live: smoke tests contra la app productiva en Railway (requieren red)

# Opciones por defecto: verbose + traceback corto
addopts = -v --tb=short

# No mostrar warnings de librerias externas
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
